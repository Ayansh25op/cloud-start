   <!DOCTYPE html>
<html>
<head>
    <title>Ayansh Cloud Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align:center;
            margin-top:100px;
        }

        button{
            font-size:24px;
            padding:20px 40px;
            border:none;
            border-radius:12px;
            cursor:pointer;
        }

        #status{
            margin-top:20px;
            font-size:18px;
        }
    </style>
</head>
<body>

<h1>☁️ Ayansh Cloud PC</h1>
<p id="serverStatus">🔄 Checking server status...</p>
<button onclick="startServer()">
🚀 Start Cloud PC
</button>

<div id="status"></div>
<div id="status"></div>

<script>
async function startServer(){

    document.getElementById("status").innerText =
        "Starting...";

    try{

        const response = await fetch(
            "https://qp84be6913.execute-api.ap-south-1.amazonaws.com"
        );

        const text = await response.text();

        document.getElementById("status").innerText =
            "✅ " + text;

    }

    catch(err){

        document.getElementById("status").innerText =
            "❌ " + err;

    }
}
async function updateStatus() {

    try {

        const response = await fetch(
            "https://kaeq75cupf.execute-api.ap-south-1.amazonaws.com/status"
        );

        const data = await response.json();
        const state = data.body || "";

        if (state.includes("running")) {

            document.getElementById("serverStatus").innerHTML =
                "🟢 Server Running";

        } else {

            document.getElementById("serverStatus").innerHTML =
                "🔴 Server Stopped";

        }

    }

    catch {

        document.getElementById("serverStatus").innerHTML =
            "⚠️ Status unavailable";

    }

}

updateStatus();
setInterval(updateStatus, 15000);
</script>

</body>
</html>
