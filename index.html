<script>
const STATUS_API =
    "https://kaeq75cupf.execute-api.ap-south-1.amazonaws.com/status";

const START_API =
    "https://qp84be6913.execute-api.ap-south-1.amazonaws.com";

async function updateStatus() {

    try {

        const response = await fetch(STATUS_API);
        const data = await response.json();

        const state = data.body || "";

        const statusDiv = document.getElementById("status");
        const button = document.getElementById("startBtn");

        if (state.includes("running")) {

            statusDiv.innerHTML =
                "🟢 Server Running";

            button.disabled = true;
            button.innerText = "✅ Cloud PC Running";

        } else {

            statusDiv.innerHTML =
                "🔴 Server Stopped";

            button.disabled = false;
            button.innerText = "🚀 Start Cloud PC";

        }

    }

    catch {

        document.getElementById("status").innerHTML =
            "⚠️ Status unavailable";

    }

}

async function startServer() {

    const statusDiv = document.getElementById("status");

    statusDiv.innerHTML =
        "⏳ Starting server...";

    try {

        const response = await fetch(START_API);
        const text = await response.text();

        statusDiv.innerHTML =
            "✅ " + text;

        setTimeout(updateStatus, 5000);

    }

    catch (err) {

        statusDiv.innerHTML =
            "❌ Failed to start server";

    }

}

updateStatus();
setInterval(updateStatus, 15000);
</script>
